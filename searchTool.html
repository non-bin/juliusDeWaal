<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Julius De Waal Archive</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="section">
      <div class="container">
        <h1 class="title">Julius De Waal Archive</h1>

        <div class="box">
          <p>Thumbnails can be enabled with the Columns dropdown</p>
          <div class="dropdown" id="columns-dropdown">
            <div class="dropdown-trigger">
              <button
                class="button"
                id="columns-dropdown-trigger"
                aria-haspopup="true"
                aria-controls="columns-dropdown-menu"
              >
                <span>Columns</span>
                <span class="icon is-small">
                  <i class="mdi mdi-chevron-down" aria-hidden="true"></i>
                </span>
              </button>
            </div>
            <div class="dropdown-menu" role="menu">
              <div class="dropdown-content" id="columns-dropdown-menu"></div>
            </div>
          </div>
        </div>

        <div class="box">
          <div class="table-container">
            <table id="table" class="table is-striped is-narrow is-hoverable is-bordered">
              <thead id="table-header"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="content has-text-centered">
        <p>
          <strong>Julius De Waal Archive</strong> by <a href="https://github.com/non-bin/">Alice Jacka</a>, drawings
          sourced from <a href="https://www.modelesavapeur.com">modelesavapeur.com</a>, source code available on
          <a href="https://github.com/non-bin/juliusDeWaal">GitHub</a>.
        </p>
      </div>
    </footer>

    <!-- For parsing CSVs -->
    <script src="https://unpkg.com/papaparse@5.5.3/papaparse.min.js"></script>

    <script src="main.js"></script>
  </body>
</html>
